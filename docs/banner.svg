<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="110" rx="300" ry="180" fill="url(#glow1)"/>
  <ellipse cx="1050" cy="110" rx="260" ry="160" fill="url(#glow2)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="3" fill="url(#topbar)"/>

  <!-- Mini table: right side -->
  <g transform="translate(690, 34)" opacity="0.92">
    <!-- Shadow -->
    <rect x="2" y="2" width="456" height="156" rx="8" fill="#000000" opacity="0.4"/>
    <!-- Table card -->
    <rect width="456" height="156" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- Header row bg -->
    <rect width="456" height="30" rx="0" fill="#1c2128"/>
    <rect width="456" height="8" rx="8" fill="#1c2128"/>
    <rect y="0" width="456" height="30" rx="0"/>
    <!-- Top-left and top-right rounded -->
    <path d="M0 8 Q0 0 8 0 H448 Q456 0 456 8 V30 H0 Z" fill="#1c2128"/>

    <!-- Header labels -->
    <text x="16" y="20" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#7d8590">Task</text>
    <text x="150" y="20" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#7d8590">Status</text>
    <text x="268" y="20" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#7d8590">Priority</text>
    <text x="375" y="20" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#7d8590">Note</text>

    <!-- Column dividers -->
    <line x1="136" y1="0" x2="136" y2="156" stroke="#30363d" stroke-width="1"/>
    <line x1="254" y1="0" x2="254" y2="156" stroke="#30363d" stroke-width="1"/>
    <line x1="362" y1="0" x2="362" y2="156" stroke="#30363d" stroke-width="1"/>

    <!-- Row dividers -->
    <line x1="0" y1="30" x2="456" y2="30" stroke="#30363d" stroke-width="1"/>
    <line x1="0" y1="62" x2="362" y2="62" stroke="#30363d" stroke-width="1"/>
    <line x1="0" y1="94" x2="456" y2="94" stroke="#30363d" stroke-width="1"/>
    <line x1="0" y1="126" x2="456" y2="126" stroke="#30363d" stroke-width="1"/>

    <!-- Row 1 -->
    <text x="16" y="51" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e6edf3">Design</text>
    <rect x="145" y="37" width="44" height="18" rx="9" fill="rgba(34,197,94,0.2)"/>
    <text x="167" y="50" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">done</text>
    <rect x="260" y="37" width="40" height="18" rx="9" fill="rgba(239,68,68,0.2)"/>
    <text x="280" y="50" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle">high</text>
    <!-- Merged cell rows 1-2 -->
    <rect x="363" y="31" width="92" height="62" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
    <text x="409" y="65" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">merged</text>

    <!-- Row 2 -->
    <text x="16" y="83" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e6edf3">Build</text>
    <rect x="138" y="69" width="78" height="18" rx="9" fill="rgba(249,115,22,0.2)"/>
    <text x="177" y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">in-progress</text>
    <rect x="258" y="69" width="56" height="18" rx="9" fill="rgba(234,179,8,0.2)"/>
    <text x="286" y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#facc15" text-anchor="middle">medium</text>

    <!-- Row 3 -->
    <text x="16" y="115" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e6edf3">Test</text>
    <rect x="148" y="101" width="42" height="18" rx="9" fill="rgba(120,120,120,0.2)"/>
    <text x="169" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">todo</text>
    <rect x="260" y="101" width="36" height="18" rx="9" fill="rgba(59,130,246,0.2)"/>
    <text x="278" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">low</text>
    <rect x="363" y="95" width="92" height="30" rx="3" fill="rgba(34,197,94,0.08)"/>
    <text x="409" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#86efac" text-anchor="middle">bg style</text>

    <!-- Row 4 -->
    <text x="16" y="147" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e6edf3">Deploy</text>
    <rect x="141" y="133" width="58" height="18" rx="9" fill="rgba(59,130,246,0.2)"/>
    <text x="170" y="146" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">pending</text>
    <rect x="260" y="133" width="40" height="18" rx="9" fill="rgba(239,68,68,0.2)"/>
    <text x="280" y="146" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#f87171" text-anchor="middle">high</text>
    <text x="409" y="146" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">[[wikilink]]</text>
  </g>

  <!-- Left: main title -->
  <text x="72" y="102"
    font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,Arial,sans-serif"
    font-size="64" font-weight="800" letter-spacing="-2" fill="#ffffff">Better</text>
  <text x="72" y="166"
    font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,Arial,sans-serif"
    font-size="64" font-weight="800" letter-spacing="-2" fill="#8b5cf6">Table</text>

  <!-- Tagline -->
  <text x="76" y="195"
    font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
    font-size="14" fill="#6e7681" letter-spacing="0.5">
    for Obsidian  ·  Merge · Style · Type · Wikilink · Reorder
  </text>
</svg>
